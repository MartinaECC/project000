<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex 用量分析看板</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <strong>Codex 用量分析</strong>
          <span>本机实时监控</span>
        </div>
      </div>
      <div class="refresh">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-text">正在连接</span>
        <button id="refresh-button" type="button">刷新</button>
      </div>
    </header>

    <main>
      <section class="kpi-grid" aria-label="用量概览">
        <article class="kpi">
          <span class="kpi-label">总 Token</span>
          <strong id="total-tokens">--</strong>
        </article>
        <article class="kpi">
          <span class="kpi-label">对话数</span>
          <strong id="thread-count">--</strong>
        </article>
        <article class="kpi">
          <span class="kpi-label">今日更新</span>
          <strong id="today-count">--</strong>
        </article>
        <article class="kpi">
          <span class="kpi-label">最近更新</span>
          <strong id="latest-update">--</strong>
        </article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h1>对话用量</h1>
            <p>按更新时间倒序展示 Codex 本机线程。</p>
          </div>
          <input id="thread-filter" type="search" placeholder="筛选标题、ID、工作区" />
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>对话</th>
                <th>Token</th>
                <th>更新时间</th>
                <th>状态</th>
                <th>工作区</th>
              </tr>
            </thead>
            <tbody id="threads-body">
              <tr><td colspan="5" class="empty">正在加载</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>最近响应明细</h2>
            <p>从 Codex 日志中的 response.completed 事件解析。</p>
          </div>
        </div>
        <div id="events-list" class="events-list">
          <div class="empty">正在加载</div>
        </div>
      </section>

      <section id="warnings" class="warnings" hidden></section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
