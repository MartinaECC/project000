        - listitem [ref=e31]: 需求完成速度不足：已经发现的用户、客户需求点，梳理需求、开发demo的速度不够快，往往ppt已经出去了，但是需求还一直没时间写
      - generic [ref=e32]: 让 AI 进入真实岗位流程，而非停留在能力演示。
