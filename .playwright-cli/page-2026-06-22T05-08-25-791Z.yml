      - list [ref=e33]:
        - listitem [ref=e34]: 数据跟进耗时多：日报、周报、复盘等占用时间多
        - listitem [ref=e35]: 项目跟进工作耗时多：客服支持，查订单，定位bug跟进消耗大量时间
        - listitem [ref=e36]: 问题发现滞后：需求配置上线之后，对数据和用户反馈跟进不及时，对于是否存在异常反应慢，发现问题之后跟进也比较慢
        - listitem [ref=e37]: 销售支持响应不足：上述任务消耗大量时间后，对销售支持，例如询问客户配置、排期、数据、方案设计等不够快
        - listitem [ref=e38]: 需求完成速度不足：已经发现的用户、客户需求点，梳理需求、开发demo的速度不够快，往往ppt已经出去了，但是需求还一直没时间写
      - generic [ref=e39]: 让 AI 进入真实岗位流程，而非停留在能力演示。
