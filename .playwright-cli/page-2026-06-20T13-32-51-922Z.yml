                        - heading "安装后提示\"command not found\"？" [level=3] [ref=e1222]
                        - paragraph [ref=e1223]:
                          - text: 确保 CLI 安装目录已添加到系统 PATH。使用脚本安装的用户，重新打开终端窗口即可。macOS 用户如遇"无法打开，因为 Apple 无法检查其是否包含恶意软件"，运行：
                          - code [ref=e1224]: xattr -d com.apple.quarantine /path/to/dws
                      - generic [ref=e1225]:
                        - heading "组织未开启 CLI 访问怎么办？" [level=3] [ref=e1226]
                        - paragraph [ref=e1227]:
                          - text: 登录时选择组织后，点击"立即申请"通知管理员。管理员收到申请卡片后一键审批，审批通过后重新运行
                          - code [ref=e1228]: dws auth login
                          - text: 。
                      - generic [ref=e1229]:
                        - heading "企业管理员如何管控权限？" [level=3] [ref=e1230]
                        - paragraph [ref=e1231]: CLI 本质上是通过钉钉应用调用开放平台 API。应用管理仍遵循企业现有的安全和访问控制策略。管理员可在开发者后台的"CLI 访问管理"中开启或关闭。
                      - generic [ref=e1232]:
                        - heading "如何在自动化任务或 AI 工作流中使用？" [level=3] [ref=e1233]
                        - paragraph [ref=e1234]:
                          - text: 在本地完成一次配置和授权后，即可将 CLI 集成到你的脚本或 AI Agent 平台中复用。所有命令支持
                          - code [ref=e1235]: "--yes"
                          - text: 跳过交互确认，
                          - code [ref=e1236]: "--format json"
                          - text: 输出结构化数据。
